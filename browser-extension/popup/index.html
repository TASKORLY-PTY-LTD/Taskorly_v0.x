<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskorly - POS Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app" class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <div class="logo-section">
          <div class="logo">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 8V4H8" />
              <rect width="16" height="12" x="4" y="8" rx="2" />
              <path d="M2 14h2" />
              <path d="M20 14h2" />
              <path d="M15 13v2" />
              <path d="M9 13v2" />
            </svg>
          </div>
          <div class="header-text">
            <h1>Taskorly</h1>
            <p id="pos-status">Scanning for POS systems...</p>
          </div>
        </div>
        <button id="settings-btn" class="icon-button" title="Settings">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />
            <path d="M12 1v6m0 6v6" />
            <path d="m15.05 7.05 3 3m-6 0 3-3m0 0-3 3m3-3-3-3" />
          </svg>
        </button>
      </header>

      <!-- Main Content -->
      <main class="popup-main">
        <!-- POS System Detection -->
        <section id="pos-section" class="section">
          <div class="pos-card" id="pos-card">
            <div class="pos-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
            <div class="pos-info">
              <div class="pos-name" id="pos-name">No POS System Detected</div>
              <div class="pos-details" id="pos-details">
                Navigate to a supported POS system
              </div>
            </div>
            <div class="pos-status-indicator" id="pos-indicator">
              <div class="status-dot"></div>
            </div>
          </div>
        </section>

        <!-- Quick Actions -->
        <section id="actions-section" class="section" style="display: none">
          <h3>Quick Actions</h3>
          <div class="action-grid">
            <button class="action-button" data-action="refund">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              Process Refund
            </button>
            <button class="action-button" data-action="payment">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect width="20" height="14" x="2" y="5" rx="2" />
                <line x1="2" x2="22" y1="10" y2="10" />
              </svg>
              Payment Help
            </button>
            <button class="action-button" data-action="product">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                />
              </svg>
              Add Product
            </button>
            <button class="action-button" data-action="reports">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 3v18h18" />
                <path d="m19 9-5 5-4-4-3 3" />
              </svg>
              View Reports
            </button>
          </div>
        </section>

        <!-- Chat Section -->
        <section id="chat-section" class="section">
          <div class="chat-header">
            <h3>Ask Anything</h3>
            <button id="open-fullscreen" class="text-button">
              Open Full Chat
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="m7 7 10 10M7 7h10M7 7v10" />
              </svg>
            </button>
          </div>
          <div class="quick-chat">
            <div class="chat-messages" id="chat-messages">
              <div class="message assistant-message">
                <div class="message-avatar">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M12 8V4H8" />
                    <rect width="16" height="12" x="4" y="8" rx="2" />
                  </svg>
                </div>
                <div class="message-content">
                  Hi! I'm here to help with your POS system. What can I assist
                  you with?
                </div>
              </div>
            </div>
            <div class="chat-input-container">
              <input
                type="text"
                id="chat-input"
                placeholder="Ask a question..."
                disabled
              />
              <button id="send-button" class="send-button" disabled>
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="m22 2-7 20-4-9-9-4Z" />
                  <path d="M22 2 11 13" />
                </svg>
              </button>
            </div>
          </div>
        </section>

        <!-- Footer Actions -->
        <footer class="popup-footer">
          <button id="toggle-overlay" class="footer-button" disabled>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              />
            </svg>
            Enable Overlay
          </button>
          <button id="help-button" class="footer-button">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <path d="M12 17h.01" />
            </svg>
            Help
          </button>
        </footer>
      </main>

      <!-- Loading State -->
      <div id="loading" class="loading-overlay" style="display: none">
        <div class="loading-spinner"></div>
        <p>Connecting to Taskorly...</p>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
